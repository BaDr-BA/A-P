name: Islamic Bot Auto Poster

on:
  schedule:
    # يعمل كل 3 ساعات
    - cron: '15 */3 * * *'
  workflow_dispatch:

# التحسين 1: منع التداخل (Concurrency)
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # التحسين 2: وقت مستقطع (Timeout) لحماية الرصيد
    timeout-minutes: 15
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          # التحسين 3: التخزين المؤقت (Caching) لتسريع التثبيت
          cache: 'pip'

      - name: Install Libraries
        run: |
          pip install -r requirements.txt

      - name: Run Bot Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
        run: python main.py

      - name: Commit and Push Changes (Safe Mode)
        run: |
          git config --global user.name "Bot Keeper"
          git config --global user.email "bot@github.com"
          
          # سحب أي تغييرات جديدة أولاً لتجنب التصادم
          git pull --rebase --autostash
          
          git add *.json || echo "No json files found"
          git commit -m "Update bot history [skip ci]" || echo "No changes to commit"
          git push
